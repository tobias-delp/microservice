apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: mini-shop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: product-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3001
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: mini-shop
spec:
  selector:
    app: product-service
  ports:
    - port: 3001
      targetPort: 3001

