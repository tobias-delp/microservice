apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: mini-shop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      containers:
        - name: inventory-service
          image: inventory-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3002
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: mini-shop
spec:
  selector:
    app: inventory-service
  ports:
    - port: 3002
      targetPort: 3002

